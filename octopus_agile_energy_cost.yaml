blueprint:
  name: "Octopus Agile - Energy Cost Tracker"
  description: >
    Logs the running electricity cost (in GBP) for a smart plug each time the
    energy reading or the Agile unit rate changes.


    ## companion sensor setup (do this first)


    Before activating this automation, create the cost sensor via the HA UI.
    This only needs to be done once.


    **Step 1 – Create a Template Sensor**

    1. Go to **Settings → Devices & Services → Helpers**.

    2. Click **+ Create Helper** and choose **Template → Template Sensor**.

    3. Fill in the fields as follows:

    - **Name:** e.g. `3D Printer Energy Cost`

    - **State template:**
      ```
      {{ (states('sensor.3d_printer_energy') | float(0)) * (states('sensor.octopus_energy_electricity_current_rate') | float(0)) }}
      ```
      *(Replace `sensor.3d_printer_energy` with your plug's energy entity if different.)*

    - **Unit of measurement:** `GBP`

    - **Device class:** `Monetary`

    - **State class:** `Total increasing`

    - **Icon:** `mdi:currency-gbp`

    4. Click **Submit**.


    **Step 2 – Assign the sensor to your smart plug device**

    1. Go to **Settings → Devices & Services → Entities**.

    2. Search for the sensor name you just created.

    3. Click the entity → click the **pencil (edit) icon**.

    4. Under **Device**, select your smart plug device.

    5. Click **Update**.


    Once the helper is created, come back and complete the automation setup below.

  domain: automation
  author: "Claude / Anthropic"
  input:
    agile_rate_entity:
      name: "Octopus Agile Current Rate Entity"
      description: >
        Sensor providing the live Agile unit price in GBP/kWh.
        Typically sensor.octopus_energy_electricity_current_rate.
      default: sensor.octopus_energy_electricity_current_rate
      selector:
        entity:
          domain: sensor

    plug_energy_entity:
      name: "Smart Plug Energy Entity (kWh)"
      description: >
        Sensor on your smart plug reporting cumulative energy in kWh
        (e.g. sensor.3d_printer_energy).
      selector:
        entity:
          domain: sensor

trigger:
  - platform: state
    entity_id: !input plug_energy_entity
  - platform: state
    entity_id: !input agile_rate_entity
  - platform: homeassistant
    event: start

variables:
  agile_rate_entity: !input agile_rate_entity
  plug_energy_entity: !input plug_energy_entity

condition:
  - condition: template
    value_template: >
      {{ states(agile_rate_entity) not in ['unavailable', 'unknown', 'none']
         and states(plug_energy_entity) not in ['unavailable', 'unknown', 'none'] }}

action:
  - variables:
      energy_kwh: "{{ states(plug_energy_entity) | float(0) }}"
      rate_gbp_per_kwh: "{{ states(agile_rate_entity) | float(0) }}"
      cost_gbp: "{{ (energy_kwh * rate_gbp_per_kwh) | round(4) }}"
  - service: logbook.log
    data:
      name: "Octopus Agile Cost Tracker"
      message: >
        {{ plug_energy_entity }} consumed {{ energy_kwh }} kWh
        at GBP {{ rate_gbp_per_kwh }}/kWh = GBP {{ cost_gbp }} total.
      entity_id: "{{ plug_energy_entity }}"

mode: single
max_exceeded: silent
